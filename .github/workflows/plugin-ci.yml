name: Plugin CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate BRAT release files
        run: npm run validate:plugin-release

      - name: Run plugin acceptance tests
        run: npm run test:plugin
